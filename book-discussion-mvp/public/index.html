<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>독서 토론</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,'Pretendard',sans-serif;background:#f5f5f5;color:#333}
    .container{max-width:640px;margin:0 auto;padding:20px 16px;min-height:100vh}
    h1{font-size:1.35rem;margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .back-btn{background:none;border:none;font-size:1.2rem;cursor:pointer;padding:4px 8px}
    .card{background:#fff;border-radius:12px;padding:16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.08)}

    /* 모임 목록 */
    .group-card{cursor:pointer;transition:transform .1s}
    .group-card:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.1)}
    .group-card .title{font-weight:700;font-size:1.05rem}
    .group-card .book{color:#4a90d9;font-size:.85rem;margin-top:4px}
    .group-card .info{font-size:.78rem;color:#999;margin-top:4px}
    .group-card .desc{font-size:.86rem;color:#666;margin-top:6px}

    /* 폼 공통 */
    .form-section{margin-top:16px}
    .form-section summary{font-weight:600;cursor:pointer;padding:10px 0;font-size:.93rem}
    label{display:block;font-size:.82rem;font-weight:600;color:#555;margin-bottom:4px;margin-top:10px}
    input,textarea{width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:.93rem;outline:none}
    input:focus,textarea:focus{border-color:#4a90d9}
    textarea{resize:vertical;min-height:60px}
    .form-row{display:flex;gap:12px}
    .form-row>div{flex:1}
    .btn{padding:10px;border:none;border-radius:8px;font-size:.93rem;font-weight:600;cursor:pointer;width:100%;margin-top:12px}
    .btn-primary{background:#4a90d9;color:#fff}
    .btn-primary:hover{background:#3a7bc8}
    .btn-outline{background:#fff;color:#4a90d9;border:1.5px solid #4a90d9}
    .btn-outline:hover{background:#eef4fb}
    .btn-sm{width:auto;padding:6px 14px;margin-top:0;font-size:.85rem}

    /* 탭 */
    .tabs{display:flex;gap:0;margin-bottom:14px;border-bottom:2px solid #e0e0e0}
    .tab{flex:1;text-align:center;padding:10px;font-size:.9rem;font-weight:600;cursor:pointer;color:#999;border-bottom:2px solid transparent;margin-bottom:-2px}
    .tab.active{color:#4a90d9;border-bottom-color:#4a90d9}

    /* 모임 상세 헤더 */
    .room-info .book{color:#4a90d9;font-size:.88rem;margin-top:2px}
    .room-info .info{font-size:.78rem;color:#999;margin-top:2px}
    .room-info .desc{font-size:.85rem;color:#666;margin-top:6px}
    .room-info .members-line{font-size:.8rem;color:#888;margin-top:6px}

    /* 주제 카드 */
    .topic-card{cursor:pointer;transition:transform .1s}
    .topic-card:hover{transform:translateY(-1px);box-shadow:0 2px 6px rgba(0,0,0,.1)}
    .topic-card .topic-title{font-weight:700;font-size:.98rem}
    .topic-card .topic-meta{font-size:.78rem;color:#999;margin-top:4px}

    /* 댓글 톡방 */
    .chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 48px)}
    .chat-area{flex:1;overflow-y:auto;padding:10px 0}
    .bubble{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 2px rgba(0,0,0,.06)}
    .bubble .author{font-weight:700;font-size:.85rem;color:#4a90d9}
    .bubble .content{font-size:.93rem;line-height:1.5;white-space:pre-wrap;margin-top:4px}
    .bubble .meta{margin-top:6px;display:flex;justify-content:space-between;align-items:center;font-size:.75rem;color:#aaa}
    .bubble .del-btn{padding:2px 8px;border:1px solid #e0e0e0;border-radius:6px;background:#fff;cursor:pointer;font-size:.73rem;color:#999}
    .bubble .del-btn:hover{background:#fee;color:#c00;border-color:#fcc}

    .input-bar{flex-shrink:0;background:#fff;border-radius:12px;padding:12px;box-shadow:0 -1px 4px rgba(0,0,0,.06)}
    .input-bar textarea{min-height:44px;font-size:.9rem}
    .input-bar .bar-bottom{display:flex;justify-content:flex-end;margin-top:8px}
    .send-btn{padding:8px 18px;background:#4a90d9;color:#fff;border:none;border-radius:8px;font-size:.88rem;font-weight:600;cursor:pointer}
    .send-btn:hover{background:#3a7bc8}

    /* 메모 버블 */
    .memo-bubble .progress-tag{display:inline-block;background:#eef4fb;color:#4a90d9;font-size:.73rem;padding:2px 8px;border-radius:8px;margin-bottom:4px}
    .badge{padding:1px 7px;border-radius:10px;font-size:.7rem;margin-left:4px}
    .badge-pub{background:#e8f5e9;color:#2e7d32}
    .badge-pri{background:#fce4ec;color:#c62828}
    .memo-actions button{padding:2px 8px;border:1px solid #e0e0e0;border-radius:6px;background:#fff;cursor:pointer;font-size:.73rem;color:#777}
    .memo-actions button:hover{background:#f5f5f5}
    .memo-actions button.del:hover{background:#fee;color:#c00;border-color:#fcc}

    .checkbox-row{display:flex;align-items:center;gap:8px;margin-top:8px}
    .checkbox-row input{width:auto}
    .checkbox-row label{margin:0;font-weight:400;font-size:.85rem}

    .empty{text-align:center;color:#bbb;padding:40px 0;font-size:.9rem}

    /* 참여 모달 */
    .join-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:10}
    .join-box{background:#fff;border-radius:14px;padding:24px;width:320px;box-shadow:0 4px 20px rgba(0,0,0,.15)}
    .join-box h2{font-size:1.1rem;margin-bottom:12px}
  </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
const API = '/api/groups';
const app = document.getElementById('app');

// 현재 닉네임 (세션 동안 유지)
let currentNickname = localStorage.getItem('nickname') || '';

function setNickname(n) { currentNickname = n; localStorage.setItem('nickname', n); }

// ===== 모임 목록 =====
async function showGroupList() {
  const groups = await (await fetch(API)).json();
  app.innerHTML = `
    <h1>📚 독서 토론 모임</h1>
    ${groups.length === 0 ? '<p class="empty">아직 모임이 없습니다</p>' :
      groups.map(g => `
        <div class="card group-card" onclick="enterGroup(${g.id})">
          <div class="title">${esc(g.name)}</div>
          <div class="book">📖 ${esc(g.bookTitle)}</div>
          <div class="info">👥 ${g.memberCount}/${g.maxMembers}명</div>
          ${g.description ? `<div class="desc">${esc(g.description)}</div>` : ''}
        </div>
      `).join('')}
    <details class="form-section">
      <summary>+ 새 모임 만들기</summary>
      <form id="groupForm" class="card" style="margin-top:8px">
        <label for="gName">모임 이름</label>
        <input id="gName" placeholder="예: 사피엔스 읽기 모임" required />
        <div class="form-row">
          <div><label for="gBook">읽을 책</label><input id="gBook" placeholder="예: 사피엔스" required /></div>
          <div><label for="gMax">최대 인원</label><input id="gMax" type="number" value="10" min="2" /></div>
        </div>
        <label for="gDesc">모임 소개</label>
        <textarea id="gDesc" placeholder="어떤 모임인지 간단히 소개해 주세요"></textarea>
        <button type="submit" class="btn btn-primary">모임 만들기</button>
      </form>
    </details>
  `;
  document.getElementById('groupForm').addEventListener('submit', async e => {
    e.preventDefault();
    await fetch(API, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({
      name:$v('gName'), bookTitle:$v('gBook'), maxMembers:parseInt($v('gMax'))||10, description:$v('gDesc')
    })});
    showGroupList();
  });
}

// ===== 모임 진입 (참여 체크) =====
async function enterGroup(id) {
  const membersRes = await fetch(`${API}/${id}/members`);
  const membersList = await membersRes.json();
  const alreadyJoined = currentNickname && membersList.find(m => m.nickname === currentNickname);
  if (alreadyJoined) return showRoom(id);
  showJoinModal(id);
}

function showJoinModal(groupId) {
  const overlay = document.createElement('div');
  overlay.className = 'join-overlay';
  overlay.innerHTML = `
    <div class="join-box">
      <h2>토론방 참여</h2>
      <label for="joinNick">닉네임</label>
      <input id="joinNick" placeholder="사용할 닉네임을 입력하세요" value="${esc(currentNickname)}" required />
      <button class="btn btn-primary" id="joinBtn">참여하기</button>
      <button class="btn btn-outline" style="margin-top:8px" id="joinCancel">취소</button>
    </div>
  `;
  document.body.appendChild(overlay);
  document.getElementById('joinCancel').onclick = () => overlay.remove();
  document.getElementById('joinBtn').onclick = async () => {
    const nick = $v('joinNick');
    if (!nick) return;
    const res = await fetch(`${API}/${groupId}/join`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ nickname:nick }) });
    if (!res.ok) { const err = await res.json(); alert(err.error); return; }
    setNickname(nick);
    overlay.remove();
    showRoom(groupId);
  };
}

// ===== 모임 상세 (탭: 토론 / 메모) =====
let currentTab = 'memos';

async function showRoom(groupId) {
  const [group, membersList] = await Promise.all([
    (await fetch(`${API}/${groupId}`)).json(),
    (await fetch(`${API}/${groupId}/members`)).json()
  ]);

  app.innerHTML = `
    <h1><button class="back-btn" onclick="showGroupList()">←</button> ${esc(group.name)}</h1>
    <div class="card room-info">
      <div class="book">📖 ${esc(group.bookTitle)}</div>
      <div class="info">최대 ${group.maxMembers}명</div>
      ${group.description ? `<div class="desc">${esc(group.description)}</div>` : ''}
      <div class="members-line">👥 참여자: ${membersList.map(m => esc(m.nickname)).join(', ') || '없음'}</div>
    </div>
    <div class="tabs">
      <div class="tab ${currentTab==='memos'?'active':''}" onclick="currentTab='memos';showRoom(${groupId})">📝 메모</div>
      <div class="tab ${currentTab==='topics'?'active':''}" onclick="currentTab='topics';showRoom(${groupId})">💬 토론</div>
    </div>
    <div id="tabContent"></div>
  `;

  if (currentTab === 'topics') renderTopics(groupId);
  else renderMemos(groupId);
}

// ===== 토론 주제 목록 =====
async function renderTopics(groupId) {
  const topics = await (await fetch(`${API}/${groupId}/topics`)).json();
  const el = document.getElementById('tabContent');
  el.innerHTML = `
    ${topics.length === 0 ? '<p class="empty">아직 주제가 없습니다</p>' :
      topics.map(t => `
        <div class="card topic-card" onclick="showTopic(${groupId},${t.id})">
          <div class="topic-title">${esc(t.title)}</div>
          <div class="topic-meta">${esc(t.author)} · ${timeAgo(t.createdAt)} · 💬 ${t.commentCount}</div>
        </div>
      `).join('')}
    <details class="form-section">
      <summary>+ 새 주제 올리기</summary>
      <form id="topicForm" class="card" style="margin-top:6px">
        <label for="tTitle">주제</label>
        <input id="tTitle" placeholder="토론하고 싶은 주제를 적어주세요" required />
        <button type="submit" class="btn btn-primary">등록</button>
      </form>
    </details>
  `;
  document.getElementById('topicForm').addEventListener('submit', async e => {
    e.preventDefault();
    await fetch(`${API}/${groupId}/topics`, { method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ title:$v('tTitle'), author:currentNickname })
    });
    renderTopics(groupId);
  });
}

// ===== 주제 댓글방 =====
async function showTopic(groupId, topicId) {
  const [topics, commentsData] = await Promise.all([
    (await fetch(`${API}/${groupId}/topics`)).json(),
    (await fetch(`${API}/${groupId}/topics/${topicId}/comments`)).json()
  ]);
  const topic = topics.find(t => t.id === topicId);

  app.innerHTML = `
    <div class="chat-wrap">
      <div>
        <h1><button class="back-btn" onclick="showRoom(${groupId})">←</button> ${esc(topic.title)}</h1>
        <div style="font-size:.82rem;color:#999;margin:-10px 0 10px 36px">${esc(topic.author)} · ${timeAgo(topic.createdAt)}</div>
      </div>
      <div class="chat-area" id="chatArea">
        ${commentsData.length === 0 ? '<p class="empty">첫 댓글을 남겨보세요 ✍️</p>' :
          commentsData.map(c => `
            <div class="bubble">
              <div class="author">${esc(c.author)}</div>
              <div class="content">${esc(c.content)}</div>
              <div class="meta">
                <span>${timeAgo(c.createdAt)}</span>
                ${c.author === currentNickname ? `<button class="del-btn" onclick="delComment(${groupId},${topicId},${c.id})">삭제</button>` : ''}
              </div>
            </div>
          `).join('')}
      </div>
      <form class="input-bar" id="commentForm">
        <textarea id="cContent" placeholder="댓글을 입력하세요..." required></textarea>
        <div class="bar-bottom">
          <button type="submit" class="send-btn">보내기</button>
        </div>
      </form>
    </div>
  `;

  const chatArea = document.getElementById('chatArea');
  chatArea.scrollTop = chatArea.scrollHeight;

  document.getElementById('commentForm').addEventListener('submit', async e => {
    e.preventDefault();
    await fetch(`${API}/${groupId}/topics/${topicId}/comments`, { method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ author:currentNickname, content:$v('cContent') })
    });
    showTopic(groupId, topicId);
  });
}

async function delComment(gid, tid, cid) {
  if (!confirm('삭제할까요?')) return;
  await fetch(`${API}/${gid}/topics/${tid}/comments/${cid}`, { method:'DELETE' });
  showTopic(gid, tid);
}

// ===== 메모 탭 =====
async function renderMemos(groupId) {
  const memos = await (await fetch(`${API}/${groupId}/memos`)).json();
  const el = document.getElementById('tabContent');
  el.innerHTML = `
    <div id="memoList">
      ${memos.length === 0 ? '<p class="empty">아직 메모가 없습니다</p>' :
        memos.map(m => `
          <div class="card memo-bubble">
            ${m.readingProgress ? `<span class="progress-tag">📄 ${esc(m.readingProgress)}</span>` : ''}
            <div class="content" style="font-size:.93rem;line-height:1.5;white-space:pre-wrap;margin-top:4px">${esc(m.content)}</div>
            <div style="margin-top:8px;display:flex;justify-content:space-between;align-items:center;font-size:.75rem;color:#aaa">
              <span>${new Date(m.createdAt).toLocaleString('ko-KR')} <span class="badge ${m.isPublic?'badge-pub':'badge-pri'}">${m.isPublic?'공개':'비공개'}</span></span>
              <div class="memo-actions" style="display:flex;gap:6px">
                <button onclick="toggleMemoVis(${groupId},${m.id})">${m.isPublic?'🔒':'🔓'}</button>
                <button class="del" onclick="delMemo(${groupId},${m.id})">삭제</button>
              </div>
            </div>
          </div>
        `).join('')}
    </div>
    <form class="card" style="margin-top:14px" id="memoForm">
      <label for="mProgress">읽은 진도</label>
      <input id="mProgress" placeholder="예: 120/350 또는 34%" />
      <label for="mContent">메모 내용</label>
      <textarea id="mContent" placeholder="읽으면서 떠오른 생각을 적어보세요" required></textarea>
      <div class="checkbox-row"><input type="checkbox" id="mPublic" /><label for="mPublic">공개 메모</label></div>
      <button type="submit" class="btn btn-primary">저장</button>
    </form>
  `;
  document.getElementById('memoForm').addEventListener('submit', async e => {
    e.preventDefault();
    await fetch(`${API}/${groupId}/memos`, { method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ readingProgress:$v('mProgress')||null, content:$v('mContent'), isPublic:document.getElementById('mPublic').checked })
    });
    currentTab='memos'; showRoom(groupId);
  });
}

async function toggleMemoVis(gid,mid) {
  await fetch(`${API}/${gid}/memos/${mid}/visibility`,{method:'PATCH'});
  currentTab='memos'; showRoom(gid);
}
async function delMemo(gid,mid) {
  if(!confirm('삭제할까요?'))return;
  await fetch(`${API}/${gid}/memos/${mid}`,{method:'DELETE'});
  currentTab='memos'; showRoom(gid);
}

// ===== 유틸 =====
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function $v(id){return document.getElementById(id).value.trim()}
function timeAgo(iso){
  const s=Math.floor((Date.now()-new Date(iso))/1000);
  if(s<60)return '방금';if(s<3600)return Math.floor(s/60)+'분 전';
  if(s<86400)return Math.floor(s/3600)+'시간 전';return Math.floor(s/86400)+'일 전';
}

showGroupList();
</script>
</body>
</html>
